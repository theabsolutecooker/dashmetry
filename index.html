<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Docs - Owen Is the BEST</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/doclist/images/mediatype/icon_1_document_x16.png">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: white;
        }
        iframe { 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        /* Hidden "Panic Button" - Press 'P' to hide the game */
        #decoy {
            display: none;
            width: 100%;
            height: 100%;
            background: white;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <iframe id="gameFrame" src="https://dashmetry.io/?suicidepreventionlifeline.org"></iframe>

    <div id="decoy">
        <h1>History Essay - Draft 1</h1>
        <p>The industrial revolution was a period of significant change...</p>
    </div>

    <script>
        // Emergency Hide Feature: Press the 'P' key to hide the game instantly
        document.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'p') {
                document.getElementById('gameFrame').style.display = 'none';
                document.getElementById('decoy').style.display = 'block';
                document.title = "Google Docs - History Essay";
            }
        });
    </script>

</body>
</html>
