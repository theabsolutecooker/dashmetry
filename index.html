<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Academic Resource Hub</title>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background-color:#f4f4f9;">

    <h2>Geometry Analysis Project</h2>
    <p>Click below to launch the interactive simulation.</p>

    <button onclick="openGame()" style="padding:15px 30px; cursor:pointer; font-weight:bold; border-radius:5px; border:1px solid #ccc;">Launch Demo</button>

    <script>
    function openGame() {
        // 1. Open the window
        var win = window.open('about:blank', '_blank');
        if (!win) {
            alert("Please allow pop-ups for this site!");
            return;
        }

        // 2. Define the game URL
        var gameUrl = "https://dashmetry.io/?suicidepreventionlifeline.org";

        // 3. Set the new title and icon
        var doc = win.document;
        doc.title = "owenissocool"; 
        
        var link = doc.createElement('link');
        link.rel = 'icon';
        link.href = 'https://ssl.gstatic.com/docs/doclist/images/mediatype/icon_1_document_x16.png';
        doc.getElementsByTagName('head')[0].appendChild(link);

        // 4. Create and style the iframe
        var iframe = doc.createElement('iframe');
        iframe.src = gameUrl;
        iframe.style.position = "fixed";
        iframe.style.top = "0";
        iframe.style.left = "0";
        iframe.style.width = "100%";
        iframe.style.height = "100%";
        iframe.style.border = "none";
        iframe.style.margin = "0";
        iframe.style.padding = "0";
        iframe.style.overflow = "hidden";
        iframe.style.zIndex = "999999";

        // 5. Inject everything into the blank page
        doc.body.style.margin = "0";
        doc.body.appendChild(iframe);
    }
    </script>

</body>
</html>
