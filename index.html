<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Studies Project - History of Games</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            margin-bottom: 50px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 24px; }
        p { line-height: 1.6; color: #666; }
        
        .launch-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 30px;
            font-weight: bold;
        }
        .launch-btn:hover {
            background-color: #2980b9;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <header>
        <h1>Academic Resource Hub</h1>
    </header>

    <div class="container">
        <h2>Topic: The Evolution of Digital Geometry</h2>
        <p>This project explores how simple shapes and physics-based engines are used in modern interactive media. Click the button below to view the interactive demonstration in a clean workspace.</p>
        
        <button class="launch-btn" onclick="openGame()">Launch Interactive Demo</button>
    </div>

    <script>
        function openGame() {
            // This creates the blank tab
            var win = window.open();
            var url = "https://dashmetry.io"; // The game URL
            
            // This sets up the blank page's look
            win.document.body.style.margin = '0';
            win.document.body.style.height = '100vh';
            
            // This builds the iframe that holds the game
            var iframe = win.document.createElement('iframe');
            iframe.style.border = 'none';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.src = url;

            // This injects the game into the blank tab
            win.document.body.appendChild(iframe);
        }
    </script>

</body>
</html>
