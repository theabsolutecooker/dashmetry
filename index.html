<script>
    function openGame() {
        var win = window.open('about:blank', '_blank');
        var gameUrl = "https://dashmetry.io/?suicidepreventionlifeline.org";

        var doc = win.document;
        // THE CHANGE IS RIGHT HERE:
        doc.title = "owenissocool"; 
        
        var link = doc.createElement('link');
        link.rel = 'icon';
        link.href = 'https://ssl.gstatic.com/docs/doclist/images/mediatype/icon_1_document_x16.png';
        doc.getElementsByTagName('head')[0].appendChild(link);

        var iframe = doc.createElement('iframe');
        iframe.src = gameUrl;
        iframe.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;";

        doc.body.style.margin = "0";
        doc.body.appendChild(iframe);
    }
    </script>
